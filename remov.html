<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة إزالة الخلفية الاحترافية</title>
    <!-- تضمين مكتبة Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين مكتبة FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- تضمين مكتبات التعامل مع الـ ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- تم التحديث للنسخة 1.7.0 لحل مشكلة الملفات المحذوفة من NPM -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/dist/browser/bundle.umd.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
        }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0891b2; /* Cyan color */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #cbd5e1;
        }
        .drop-zone.dragover {
            background-color: #cffafe;
            border-color: #0891b2;
            transform: scale(1.02);
        }

        /* خلفية المربعات الشفافة */
        .transparent-bg {
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(135deg, #e2e8f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%),
                linear-gradient(135deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;
            background-color: white;
        }

        .image-card {
            transition: transform 0.2s;
        }
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        
        <header class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            <div class="relative z-10">
                <h1 class="text-4xl font-extrabold mb-3 tracking-tight"><i class="fa-solid fa-wand-magic-sparkles mr-2 text-cyan-200"></i> مزيل الخلفية الاحترافي</h1>
                <p class="text-cyan-100 text-lg">ارفع صورك وسيتم تفريغها باستخدام الذكاء الاصطناعي مجاناً وبسرعة.</p>
            </div>
        </header>

        <div class="p-6 md:p-10">
            
            <div id="model-loading" class="mb-8 p-6 bg-cyan-50 border border-cyan-100 rounded-2xl hidden flex-col gap-4 shadow-inner">
                <div class="flex items-center gap-3 text-cyan-800 font-bold text-lg">
                    <div class="loader" style="width: 24px; height: 24px; border-width: 3px;"></div>
                    <span>جاري تحميل ملفات الذكاء الاصطناعي (يحدث مرة واحدة فقط)...</span>
                </div>
                <div class="w-full bg-cyan-200 rounded-full h-4 overflow-hidden shadow-inner">
                    <div id="progress-bar-fill" class="bg-cyan-600 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
                <div id="loading-details" class="text-sm text-cyan-700 text-right font-medium">جاري التحضير... برجاء الانتظار</div>
            </div>

            <div id="drop-area" class="drop-zone p-12 rounded-3xl text-center cursor-pointer bg-slate-50 hover:bg-slate-100 flex flex-col items-center justify-center gap-5 mb-10 border-2 border-dashed border-slate-300">
                <div class="w-20 h-20 bg-cyan-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-cyan-600"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-700">اسحب وأفلت الصور هنا</h3>
                <p class="text-slate-500 text-lg">أو اضغط لاختيار الصور من جهازك</p>
                <p class="text-slate-400 text-sm font-medium">ندعم (JPG, PNG, WEBP, BMP... الخ)</p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                <button class="mt-4 px-8 py-3 bg-gradient-to-r from-cyan-500 to-cyan-600 text-white font-bold rounded-full hover:from-cyan-600 hover:to-cyan-700 hover:shadow-lg transition-all transform hover:-translate-y-1">
                    تصفح الملفات
                </button>
            </div>

            <div id="toolbar" class="flex flex-wrap justify-between items-center mb-8 hidden gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-200 shadow-sm">
                <div class="font-bold text-slate-700 text-lg">
                    <span id="total-count" class="bg-cyan-100 text-cyan-800 px-3 py-1 rounded-lg">0</span> صورة / صور
                </div>
                <div class="flex flex-wrap gap-3">
                    <button id="process-all-btn" class="px-5 py-2.5 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition flex items-center gap-2 shadow-sm">
                        <i class="fa-solid fa-play"></i> معالجة الكل
                    </button>
                    <button id="download-all-btn" class="px-5 py-2.5 bg-cyan-600 text-white font-semibold rounded-xl hover:bg-cyan-700 transition flex items-center gap-2 shadow-sm hidden">
                        <i class="fa-solid fa-file-zipper"></i> تحميل الكل (ZIP)
                    </button>
                    <button id="clear-all-btn" class="px-5 py-2.5 bg-rose-100 text-rose-700 font-semibold rounded-xl hover:bg-rose-200 transition flex items-center gap-2">
                        <i class="fa-solid fa-trash-can"></i> مسح الكل
                    </button>
                </div>
            </div>

            <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- الصور ستضاف هنا عبر JavaScript -->
            </div>

        </div>
    </div>

    <div id="custom-alert" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center mx-4 transform transition-transform scale-100">
            <i class="fa-solid fa-circle-exclamation text-5xl text-rose-500 mb-5"></i>
            <h3 class="text-xl font-bold text-slate-800 mb-2">تنبيه</h3>
            <p id="alert-message" class="text-slate-600 font-medium mb-8 leading-relaxed"></p>
            <button onclick="document.getElementById('custom-alert').classList.add('hidden')" class="w-full py-3 bg-cyan-600 text-white font-bold rounded-xl hover:bg-cyan-700 transition shadow-md">حسناً، فهمت</button>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const toolbar = document.getElementById('toolbar');
        const totalCountSpan = document.getElementById('total-count');
        const processAllBtn = document.getElementById('process-all-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const modelLoadingDiv = document.getElementById('model-loading');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const loadingDetails = document.getElementById('loading-details');

        let imagesData = [];
        let isProcessing = false;
        let modelLoaded = false;

        // تم مسح مسار publicPath ليتم الاعتماد على السيرفر الرسمي للمكتبة وتجنب أخطاء 404
        const config = {
            progress: (key, current, total) => {
                if (!modelLoaded) {
                    modelLoadingDiv.classList.remove('hidden');
                    modelLoadingDiv.classList.add('flex');
                    
                    if (total > 0) {
                        const percent = Math.round((current / total) * 100);
                        progressBarFill.style.width = percent + '%';
                        loadingDetails.innerText = `جاري تنزيل الملفات: ${percent}%`;
                    } else {
                        const loadedMB = (current / (1024 * 1024)).toFixed(1);
                        loadingDetails.innerText = `جاري التحميل... تم تنزيل ${loadedMB} ميجابايت`;
                        progressBarFill.style.width = '100%';
                        progressBarFill.classList.add('animate-pulse');
                    }
                }
            }
        };

        function showAlert(message) {
            document.getElementById('alert-message').innerText = message;
            document.getElementById('custom-alert').classList.remove('hidden');
        }

        const generateId = () => Math.random().toString(36).substr(2, 9);

        const readFileAsDataURL = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsDataURL(file);
            });
        };

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', handleDrop, false);
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFilesSelect);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFilesSelect(e) {
            const files = e.target.files;
            handleFiles(files);
            fileInput.value = '';
        }

        async function handleFiles(files) {
            if (files.length === 0) return;

            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showAlert('الرجاء اختيار ملفات صور فقط.');
                return;
            }

            for (const file of imageFiles) {
                const id = generateId();
                const dataUrl = await readFileAsDataURL(file);
                
                const imgObj = {
                    id: id,
                    file: file,
                    originalUrl: dataUrl,
                    processedUrl: null,
                    status: 'pending',
                    element: null
                };
                
                imagesData.push(imgObj);
                createImageCard(imgObj);
            }

            updateUI();
        }

        function createImageCard(imgData) {
            const card = document.createElement('div');
            card.className = 'image-card bg-white border border-slate-200 rounded-2xl overflow-hidden flex flex-col relative';
            card.id = `card-${imgData.id}`;

            card.innerHTML = `
                <div class="relative h-56 transparent-bg flex items-center justify-center bg-slate-100 overflow-hidden group">
                    <img src="${imgData.originalUrl}" alt="Original" class="max-w-full max-h-full object-contain transition-opacity duration-300" id="img-${imgData.id}">
                    
                    <div id="overlay-${imgData.id}" class="absolute inset-0 bg-slate-900/60 flex flex-col items-center justify-center text-white hidden backdrop-blur-sm transition-all">
                        <div class="loader mb-3"></div>
                        <span class="text-sm font-bold tracking-wide">جاري المعالجة...</span>
                    </div>

                    <div id="status-badge-${imgData.id}" class="absolute top-3 right-3 px-3 py-1 rounded-full text-xs font-bold hidden shadow-md"></div>
                </div>

                <div class="p-4 bg-white border-t border-slate-100 flex justify-between items-center mt-auto">
                    <div class="flex gap-2" id="action-buttons-${imgData.id}">
                         <button id="btn-process-${imgData.id}" class="process-btn px-4 py-2 bg-cyan-50 text-cyan-600 hover:bg-cyan-600 hover:text-white rounded-xl font-semibold transition flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> تفريغ
                        </button>
                        <button id="btn-download-${imgData.id}" class="download-btn px-4 py-2 bg-green-50 text-green-600 hover:bg-green-600 hover:text-white rounded-xl font-semibold transition hidden flex items-center gap-2">
                            <i class="fa-solid fa-download"></i> تحميل
                        </button>
                    </div>
                    <button id="btn-remove-${imgData.id}" class="remove-btn p-2 text-rose-400 hover:bg-rose-50 hover:text-rose-600 rounded-xl transition">
                        <i class="fa-solid fa-trash-can text-lg"></i>
                    </button>
                </div>
            `;

            imgData.element = card;
            gallery.appendChild(card);

            card.querySelector(`#btn-process-${imgData.id}`).addEventListener('click', () => processSingleImage(imgData.id));
            card.querySelector(`#btn-download-${imgData.id}`).addEventListener('click', () => downloadSingleImage(imgData.id));
            card.querySelector(`#btn-remove-${imgData.id}`).addEventListener('click', () => removeImage(imgData.id));
        }

        function updateUI() {
            totalCountSpan.innerText = imagesData.length;
            
            if (imagesData.length > 0) {
                toolbar.classList.remove('hidden');
                
                const allDone = imagesData.length > 0 && imagesData.every(img => img.status === 'done');
                if (allDone) {
                    downloadAllBtn.classList.remove('hidden');
                    processAllBtn.classList.add('hidden');
                } else {
                    downloadAllBtn.classList.add('hidden');
                    processAllBtn.classList.remove('hidden');
                }

                processAllBtn.disabled = isProcessing;
                processAllBtn.classList.toggle('opacity-50', isProcessing);
                processAllBtn.classList.toggle('cursor-not-allowed', isProcessing);
                clearAllBtn.disabled = isProcessing;
                
            } else {
                toolbar.classList.add('hidden');
            }
        }

        async function processSingleImage(id) {
            const imgData = imagesData.find(img => img.id === id);
            if (!imgData || imgData.status === 'processing' || imgData.status === 'done') return;

            imgData.status = 'processing';
            const overlay = document.getElementById(`overlay-${id}`);
            const btnProcess = document.getElementById(`btn-process-${id}`);
            const btnDownload = document.getElementById(`btn-download-${id}`);
            const statusBadge = document.getElementById(`status-badge-${id}`);
            
            overlay.classList.remove('hidden');
            btnProcess.classList.add('hidden');
            
            try {
                // استدعاء مكتبة الذكاء الاصطناعي لإزالة الخلفية
                const blob = await imglyRemoveBackground(imgData.file, config);
                
                // إخفاء شريط التحميل بعد الانتهاء
                modelLoaded = true;
                modelLoadingDiv.classList.add('hidden');
                modelLoadingDiv.classList.remove('flex');
                progressBarFill.classList.remove('animate-pulse');

                // تحويل النتيجة لملف مرئي
                const processedUrl = URL.createObjectURL(blob);
                imgData.processedUrl = processedUrl;
                imgData.status = 'done';

                const displayImgElement = document.getElementById(`img-${id}`);
                displayImgElement.src = processedUrl;
                
                overlay.classList.add('hidden');
                btnDownload.classList.remove('hidden');
                
                statusBadge.textContent = 'تم التفريغ';
                statusBadge.className = 'absolute top-3 right-3 px-3 py-1 rounded-full text-xs font-bold bg-green-500 text-white shadow-md';
                statusBadge.classList.remove('hidden');

            } catch (error) {
                console.error("Error processing image Details:", error);
                imgData.status = 'error';
                
                overlay.classList.add('hidden');
                btnProcess.classList.remove('hidden');
                
                statusBadge.textContent = 'حدث خطأ';
                statusBadge.className = 'absolute top-3 right-3 px-3 py-1 rounded-full text-xs font-bold bg-rose-500 text-white shadow-md';
                statusBadge.classList.remove('hidden');

                modelLoadingDiv.classList.add('hidden');
                modelLoadingDiv.classList.remove('flex');
                
                // رسالة واضحة في حالة حدوث أي مشكلة مع طباعة تفاصيل الخطأ
                showAlert('حدث خطأ أثناء الاتصال: ' + (error.message || 'يرجى المحاولة مرة أخرى.'));
            }

            updateUI();
        }

        async function processAllImages() {
            if (isProcessing) return;
            isProcessing = true;
            updateUI();

            const pendingImages = imagesData.filter(img => img.status === 'pending' || img.status === 'error');
            
            for (const img of pendingImages) {
                await processSingleImage(img.id);
            }

            isProcessing = false;
            updateUI();
        }

        function removeImage(id) {
            if(isProcessing) {
                const img = imagesData.find(i => i.id === id);
                if(img && img.status === 'processing') return;
            }

            imagesData = imagesData.filter(img => img.id !== id);
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.remove();
            }
            updateUI();
        }

        function clearAll() {
            if (isProcessing) return;
            imagesData = [];
            gallery.innerHTML = '';
            updateUI();
        }

        function downloadSingleImage(id) {
            const imgData = imagesData.find(img => img.id === id);
            if (!imgData || imgData.status !== 'done') return;

            const a = document.createElement('a');
            a.href = imgData.processedUrl;
            const originalName = imgData.file.name;
            const nameWithoutExt = originalName.substring(0, originalName.lastIndexOf('.')) || originalName;
            a.download = `${nameWithoutExt}-no-bg.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function downloadAll() {
            const doneImages = imagesData.filter(img => img.status === 'done');
            if (doneImages.length === 0) return;

            const zip = new JSZip();
            
            for (let i = 0; i < doneImages.length; i++) {
                const img = doneImages[i];
                try {
                    const response = await fetch(img.processedUrl);
                    const blob = await response.blob();
                    
                    const originalName = img.file.name;
                    const nameWithoutExt = originalName.substring(0, originalName.lastIndexOf('.')) || originalName;
                    const fileName = `${nameWithoutExt}-no-bg.png`;
                    
                    zip.file(fileName, blob);
                } catch (err) {
                    console.error("Failed to add file to zip:", err);
                }
            }

            zip.generateAsync({type:"blob"}).then(function(content) {
                saveAs(content, "images-no-bg.zip");
            });
        }

        processAllBtn.addEventListener('click', processAllImages);
        clearAllBtn.addEventListener('click', clearAll);
        downloadAllBtn.addEventListener('click', downloadAll);

    </script>
</body>
</html>
